<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我是谁 · 当代生存状态检测</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* =====  Soft Warm Editorial palette  ===== */
    :root {
      --ink: #332b23;
      --stone: #8c8070;
      --paper: #faf7f2;
      --card: #ffffff;
      --rust: #b85c3a;
      --sand: #f0e8dd;
      --border: rgba(0,0,0,0.06);
      --sage: #5c8a6e;
      --dim-red: #d4856b;
      --dim-blue: #7b9db5;
      --dim-green: #7aa886;
      --dim-purple: #9b8cb5;
      /* 主题色 - 默认 rust，后续 JS 会动态覆盖 */
      --accent: var(--rust);
      --accent-light: var(--sand);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      padding: 32px 24px;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.5s ease;
    }
    .screen.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    /* =====  首页  ===== */
    #home { justify-content: center; align-items: center; text-align: center; gap: 24px; }
    .logo-icon {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 64px; line-height: 1; color: var(--rust);
      margin-bottom: 4px;
    }
    .main-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 32px; font-weight: 700; line-height: 1.25;
      color: var(--ink); letter-spacing: 0.5px;
    }
    .main-desc {
      color: var(--stone); font-size: 15px; line-height: 1.8;
      max-width: 300px; margin: 0 auto;
    }
    .question-count {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
      margin: 4px 0;
    }
    .count-pill {
      padding: 5px 12px; border-radius: 16px;
      background: var(--sand); border: none;
      color: var(--stone); font-size: 13px;
    }
    .start-btn {
      width: 240px; height: 52px;
      background: var(--ink); border: none; border-radius: 8px;
      color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.5px;
      transition: all 0.25s;
    }
    .start-btn:hover { background: #4a3f36; transform: translateY(-1px); }
    .home-note { color: var(--stone); font-size: 12px; opacity: 0.7; }

    /* =====  问题页  ===== */
    #quiz { gap: 0; padding-top: 24px; }
    .quiz-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .progress-track { flex: 1; height: 3px; background: var(--sand); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 2px; transition: width 0.4s ease; }
    .quiz-step { font-size: 12px; color: var(--stone); white-space: nowrap; font-weight: 500; }
    .question-label { font-size: 11px; color: var(--accent); margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .question-text {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px; font-weight: 400; line-height: 1.5;
      margin-bottom: 28px; color: var(--ink);
      min-height: 60px;
    }
    .options { display: flex; flex-direction: column; gap: 10px; flex: 1; }
    .opt-btn {
      padding: 16px 20px; border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--ink); font-size: 14px; text-align: left;
      cursor: pointer; transition: all 0.2s; line-height: 1.6;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    .opt-btn:hover { border-color: var(--accent); background: #fdf8f4; transform: translateY(-1px); }
    .opt-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .opt-btn:active { transform: scale(0.98); background: var(--sand); }
    .prev-btn {
      margin-top: 20px; padding: 12px; border-radius: 8px;
      background: transparent; border: 1px solid var(--border); color: var(--stone);
      font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .prev-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* =====  思考中  ===== */
    #thinking { justify-content: center; align-items: center; gap: 20px; text-align: center; }
    .think-icon { font-size: 40px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    .think-title { font-size: 18px; font-weight: 600; color: var(--ink); }
    .think-sub { font-size: 13px; color: var(--stone); margin-top: 4px; }

    /* =====  结果页  ===== */
    #result { gap: 14px; }
    .result-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      border-top: 3px solid var(--accent);
    }
    .result-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 14px;
      background: var(--accent); border: none;
      font-size: 11px; color: #fff; margin-bottom: 20px;
      font-weight: 600; letter-spacing: 0.5px;
    }
    .result-type-icon { font-size: 40px; margin-bottom: 8px; line-height: 1; }
    .result-type-name {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px; font-weight: 700; color: var(--ink); margin-bottom: 6px;
    }
    .result-type-sub { font-size: 14px; color: var(--stone); margin-bottom: 24px; line-height: 1.5; }
    .result-main-quote {
      text-align: center; padding: 20px 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px; color: var(--stone); line-height: 1.7;
      margin-bottom: 24px; font-style: italic;
      position: relative;
    }
    .result-main-quote::before {
      content: '"'; display: block;
      font-family: Georgia, serif;
      font-size: 48px; color: var(--accent-light); line-height: 0.6;
      margin-bottom: 8px;
    }
    .peer-section { margin-bottom: 20px; }
    .peer-title { font-size: 12px; color: var(--stone); margin-bottom: 14px; font-weight: 600; letter-spacing: 0.5px; }
    .peer-bars { display: flex; flex-direction: column; gap: 10px; }
    .peer-row { display: flex; align-items: center; gap: 10px; }
    .peer-label { font-size: 12px; color: var(--stone); width: 60px; flex-shrink: 0; }
    .peer-bar-bg { flex: 1; height: 6px; background: var(--sand); border-radius: 3px; overflow: hidden; }
    .peer-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .peer-pct { font-size: 11px; color: var(--stone); width: 28px; text-align: right; }
    .result-note {
      background: var(--paper); border-radius: 10px; padding: 16px;
      font-size: 13px; color: var(--stone); line-height: 1.7;
      margin-bottom: 4px;
    }
    .qr-section {
      text-align: center; padding: 20px 0 4px;
      border-top: 1px solid var(--border); margin-top: 20px;
    }
    .qr-title { font-size: 13px; color: var(--ink); margin-bottom: 14px; font-weight: 600; }
    .qr-code { width: 140px; height: 140px; border-radius: 8px; background: #fff; padding: 6px; margin: 0 auto; display: block; border: 1px solid var(--border); }
    .qr-hint { font-size: 11px; color: var(--stone); margin-top: 10px; }
    .share-hint { text-align: center; color: var(--stone); font-size: 11px; margin-top: 12px; opacity: 0.6; }
    .result-actions { display: flex; gap: 10px; margin-top: 6px; }
    .action-btn {
      flex: 1; padding: 14px; border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer; border: none;
      transition: all 0.25s; text-align: center;
    }
    .save-btn { background: var(--ink); color: #fff; }
    .save-btn:hover { background: #4a3f36; }
    .share-btn { background: var(--card); color: var(--ink); border: 1px solid var(--border); }
    .share-btn:hover { border-color: var(--accent); }
    .retest-btn {
      width: 100%; padding: 14px; border-radius: 10px;
      background: transparent; border: 1px solid var(--border); color: var(--stone);
      font-size: 13px; cursor: pointer; margin-top: 10px; transition: all 0.25s;
    }
    .retest-btn:hover { border-color: var(--ink); color: var(--ink); }
    .friend-btn {
      width: 100%; padding: 14px; border-radius: 10px;
      background: var(--accent); border: none; color: #fff;
      font-size: 13px; cursor: pointer; margin-top: 10px; transition: all 0.25s;
    }
    .friend-btn:hover { opacity: 0.9; }

    #toast {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: #fff; padding: 12px 24px;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      z-index: 9999; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* =====  考朋友弹窗  ===== */
    #friend-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 1000;
      display: none; justify-content: center; align-items: flex-end;
    }
    #friend-modal.show { display: flex; }
    .friend-sheet {
      background: var(--card); border-radius: 20px 20px 0 0;
      padding: 24px; width: 100%; max-width: 480px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-title { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 16px; text-align: center; }
    .sheet-desc { font-size: 13px; color: var(--stone); margin-bottom: 20px; text-align: center; }
    .friend-questions { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .fq-btn {
      padding: 16px; border-radius: 10px;
      background: var(--paper); border: 1px solid var(--border);
      color: var(--ink); font-size: 13px; text-align: left;
      cursor: pointer; transition: all 0.2s; line-height: 1.6;
    }
    .fq-btn:hover { border-color: var(--accent); background: var(--card); }
    .fq-label { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
    .sheet-close {
      width: 100%; padding: 14px; border-radius: 10px;
      background: transparent; border: 1px solid var(--border); color: var(--stone);
      font-size: 14px; cursor: pointer; transition: all 0.25s;
    }
    .sheet-close:hover { border-color: var(--ink); color: var(--ink); }

    /* =====  彩蛋特效  ===== */
    .egg-burst {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); z-index: 2000;
      display: none; justify-content: center; align-items: center;
      flex-direction: column; gap: 20px;
    }
    .egg-burst.show { display: flex; animation: fadeIn 0.5s ease; }
    .egg-burst-icon { font-size: 80px; animation: eggPop 0.6s ease; }
    @keyframes eggPop { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .egg-burst-title { font-size: 24px; font-weight: 700; color: #fff; }
    .egg-burst-sub { font-size: 14px; color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
<div class="container">

  <div class="screen active" id="home">
    <div class="logo-icon">&sect;</div>
    <div class="main-title">当代人生状态测试</div>
    <div class="main-desc" id="mainDesc">
      大家看起来都在走主线剧情<br>
      只有你感觉自己像个临时加塞的 NPC？<br><br>
      <strong style="color:var(--rust)">这不是你的问题。世界本来就是个草台班子。</strong>
    </div>
    <div class="question-count">
      <span class="count-pill">8 道题</span>
      <span class="count-pill">约 2 分钟</span>
      <span class="count-pill" id="typeCount">8 种身份</span>
    </div>
    <button class="start-btn" id="startBtn">开始测试</button>
    <div class="home-note">仅限自嘲，拒绝贩卖焦虑。</div>
  </div>

  <div class="screen" id="quiz">
    <div class="quiz-header">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="quiz-step" id="quizStep">1/8</div>
    </div>
    <div class="question-label" id="questionLabel">状态读取中...</div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="options"></div>
    <button class="prev-btn" id="prevBtn">← 上一题</button>
  </div>

  <div class="screen" id="thinking">
    <div class="think-icon">&middot;&middot;&middot;</div>
    <div class="think-title">正在解析...</div>
    <div class="think-sub" id="thinkSub">不用紧张，大家都挺拧巴的。</div>
  </div>

  <div class="screen" id="result">
    <div class="result-card" id="resultCard">
      <div class="result-badge" id="resultBadge">身份鉴定报告</div>
      <div class="result-type-icon" id="resultIcon"></div>
      <div class="result-type-name" id="resultName"></div>
      <div class="result-type-sub" id="resultSub"></div>
      <div class="result-main-quote" id="resultQuote"></div>
      <div class="peer-section">
        <div class="peer-title">你的四维画像</div>
        <div class="peer-bars" id="peerBars"></div>
      </div>
      <div class="result-note" id="resultNote"></div>
      <div class="qr-section" id="qrSection">
        <div class="qr-title">扫码直接开测</div>
        <img class="qr-code" id="qrCode" alt="扫码打开测试" />
        <div class="qr-hint">分享给朋友，看看他们是什么身份</div>
      </div>
      <div class="share-hint">长按保存图片 · 寻找世界上另一个你</div>
    </div>
    <div class="result-actions">
      <button class="action-btn save-btn" id="saveImgBtn">保存报告</button>
      <button class="action-btn share-btn" id="shareTextBtn">复制文案</button>
    </div>
    <button class="friend-btn" id="friendModalBtn">🎯 考考朋友</button>
    <button class="retest-btn" id="retestBtn">重新测试</button>
  </div>

</div>

<!-- 考朋友弹窗 -->
<div id="friend-modal">
  <div class="friend-sheet">
    <div class="sheet-title">🎯 考考你朋友</div>
    <div class="sheet-desc">选一道灵魂拷问发给朋友，看TA怎么选？</div>
    <div class="friend-questions" id="friendQuestions"></div>
    <button class="sheet-close" id="closeFriendModalBtn">取消</button>
  </div>
</div>

<!-- 彩蛋弹窗 -->
<div id="egg-burst" class="egg-burst">
  <div class="egg-burst-icon" id="eggIcon"></div>
  <div class="egg-burst-title" id="eggTitle"></div>
  <div class="egg-burst-sub" id="eggSub"></div>
</div>

<div id="toast"></div>

<script>
// ========== 首页随机文案 ==========
const homeSlogans = [
  {
    emoji: "🤔",
    text: "大家看起来都在走主线剧情<br>只有你感觉自己像个临时加塞的 NPC？<br><br><strong style=\"color:var(--rust)\">这不是你的问题。世界本来就是个草台班子。</strong>"
  },
  {
    emoji: "🫠",
    text: "躺又躺不平，卷又卷不赢<br>间歇性踌躇满志，持续性混吃等死？<br><br><strong style=\"color:var(--rust)\">没关系，先看完这个测试再说。</strong>"
  },
  {
    emoji: "💀",
    text: "收藏夹吃灰三年了<br>今天来直面一下自己的真实状态？<br><br><strong style=\"color:var(--rust)\">看完不准骂我。</strong>"
  },
  {
    emoji: "🌊",
    text: "每天都活得像被生活推着走<br>想知道自己到底是什么类型的人吗？<br><br><strong style=\"color:var(--rust)\">8道题，还你一个真实的自己。</strong>"
  },
  {
    emoji: "🎭",
    text: "表面岁月静好，背地里一地鸡毛<br>来测测你到底是哪种「当代人」？<br><br><strong style=\"color:var(--rust)\">仅限自嘲，拒绝玻璃心。</strong>"
  },
  {
    emoji: "✨",
    text: "不想奋斗了，想直接退休<br>但又觉得自己还能再抢救一下？<br><br><strong style=\"color:var(--rust)\">先做完这套题再决定躺还是卷。</strong>"
  }
];

// ========== 主题色配置 ==========
const themeColors = {
  derelict:      { accent: '#9b8cb5', light: '#e8e4f0' },
  hustler:       { accent: '#d4856b', light: '#fae8e0' },
  hoarder:       { accent: '#7aa886', light: '#e4f0e8' },
  extra:         { accent: '#b85c3a', light: '#f5e8e0' },
  quant:         { accent: '#7b9db5', light: '#e4ecf4' },
  involutionist: { accent: '#c45c5c', light: '#f8e4e4' },
  migratory:     { accent: '#5c8a8a', light: '#e4f0f0' },
  npc:           { accent: '#8c8070', light: '#f0ece6' },
  // 彩蛋身份
  awakened:      { accent: '#e6b800', light: '#fff8e0' },
  zen_master:    { accent: '#6b8e6b', light: '#e8f0e8' },
  paradox:       { accent: '#8e6b8e', light: '#f0e8f0' }
};

// ========== 题库 ==========
const questions = [
  {
    label: '信息焦虑',
    q: '当你刷到一个看起来很有搞头的新趋势（比如副业路子、投资风口）时，你的第一反应是？',
    opts: [
      '迅速分析利弊和可行性，一旦觉得胜算不大就果断放弃',
      '立刻收藏教程和攻略，列入"有空就学"清单，然后再也没打开过',
      '马上热血上头开始搞，但遇到第一个困难就顺势放弃了',
      '扫一眼就划走，反正这些东西跟我没什么关系'
    ]
  },
  {
    label: '生活压力',
    q: '想想你现在的居住和钱的状态，最让你无奈的是？',
    opts: [
      '算了各种政策补贴和贷款方案，越算越觉得自己像个被筛来筛去的数据',
      '工资大半交了房租月供，但还是控制不住买一堆没用的东西来安慰自己',
      '想过离开大城市，但深知自己已经回不去那个没有机会和圈子的老家了',
      '精打细算做了一堆计划，但总有意外支出把我的生活打回原形'
    ]
  },
  {
    label: '比较心',
    q: '看到曾经不如你的人突然混得比你好，你的内心弹幕是？',
    opts: [
      '"凭什么？"然后开始复盘自己的人生选择是不是哪里出了问题',
      '极度焦虑，连夜给自己制定逆袭计划，坚持两天后恢复原样',
      '毫无波澜，我只关心下个假期去哪玩、路线规划好了没',
      '觉得谁都不容易，大家只是把好的一面晒出来了而已'
    ]
  },
  {
    label: '自我感觉',
    q: '如果把你现在的状态比作一样东西，你觉得最像？',
    opts: [
      '一件缝缝补补的旧外套：外面看着还过得去，里面全是线头',
      '一个塞得满满当当的杂物间：什么都往里扔，但从来没真正整理过',
      '一根绷到极限的橡皮筋：不敢松懈，时刻担心下一秒就会断掉',
      '一台自动播放的收音机：每天说的话做的事，和昨天没什么不同'
    ]
  },
  {
    label: '放空时间',
    q: '面对一个难得的长假，完全没有工作和琐事打扰，你会？',
    opts: [
      '制定详尽的旅行攻略，精确规划每一天的路线和花销，享受掌控感',
      '瘫在床上刷手机，心里想着该干点正事，但身体完全不想动，刷到凌晨',
      '试图清空收藏夹里攒了好几年没看的电影和书，最后打开了综艺',
      '和工作日唯一的区别，就是换了个姿势和地点看屏幕'
    ]
  },
  {
    label: '压力来了',
    q: '当多个麻烦同时爆发（工作出错、感情出问题、家里出事）时，你的第一反应是？',
    opts: [
      '表面："好的我来处理"，内心："我想原地消失"',
      '试图在混乱中找出规律和逻辑，因为承认生活是随机的实在太可怕了',

  {

    q: '无论是在白天的工位，还是深夜的被窝，你心底其实知道但不愿承认的是？',
    opts: [
      '不管多努力地规划、复盘、总结经验，也算不准自己人生的下一步',
      '我其实也就是个普通人，没有什么主角光环，世界就是个大草台班子',
      '那些完美的计划和长远的设想，只是为了掩盖我当下不敢迈出第一步的胆怯',
      '我根本没那么想成功、想暴富，我只是想停下来喘口气，不那么累而已'

];

// ========== 身份设定 ==========
const identityTypes = {
  derelict: {
    id: 'derelict', icon: '🧠', name: '高认知废物', sub: '懂了一堆大道理，但连下楼拿外卖都嫌累',
    quote: '「我的脑子已经跑到罗马了，但我的行动力还在被窝里。」',
    note: '别自责，看得太透，反而懒得动。你需要的不是更多道理，是哪怕先做一小步。',
    scores: { anxiety: 85, logic: 95, action: 20, emptiness: 80 }
  },
  hustler: {
    id: 'hustler', icon: '🪫', name: '薛定谔的奋斗者', sub: '间歇性踌躇满志，持续性混吃等死',
    quote: '「只要我不睁眼，昨晚定下的宏伟逆袭计划就没有失败。」',
    note: '这种仰卧起坐式的挣扎，说明你心里的火还没完全熄灭。承认自己偶尔软弱，比硬撑着强。',

  },
  hoarder: {
    id: 'hoarder', icon: '🐿️', name: '赛博仓鼠', sub: '收藏了等于学会了，买课了等于掌握了',
    quote: '「在成为大佬之前，我先成为了一个无情的资料收藏夹。」',
    note: '囤东西是因为心里没底。放过那些吃灰的教程吧，哪怕只写一行烂代码，也比收藏一万个完美方案强。',
    scores: { anxiety: 75, logic: 70, action: 30, emptiness: 50 }
  },
  extra: {
    id: 'extra', icon: '🎭', name: '草台班子群演', sub: '每天都在假装自己是个情绪稳定的大人',
    quote: '「每天最累的不是干活，是维持"我看起来很专业"的人设。」',
    note: '恭喜你发现了世界的真相：这世界就是个巨大的草台班子。没有谁是完全准备好的，大家都是一边崩溃一边假装能行。',
    scores: { anxiety: 80, logic: 50, action: 70, emptiness: 75 }
  },
  quant: {
    id: 'quant', icon: '📈', name: '量化玄学信徒', sub: '试图用K线和复盘来掌控失控的生活',
    quote: '「一切都可以被量化，除了我那跌跌不休的运气和余额。」',
    note: '试图给混乱的生活建立一套算法，本身就是一种勇敢。但偶尔也要允许系统出现无法捕捉的 Bug，那叫生活。',
    scores: { anxiety: 85, logic: 100, action: 65, emptiness: 40 }
  },
  involutionist: {
    id: 'involutionist', icon: '🌪️', name: '被迫营业的卷王', sub: '你恨内卷，但你更怕掉队',
    quote: '「我不想赢，我只是不敢输。」',
    note: '你很累，因为你同时承受着"想躺"的清醒和"必须卷"的恐惧。试着放过自己，跑在中间也没关系的。',
    scores: { anxiety: 95, logic: 70, action: 90, emptiness: 55 }
  },
  migratory: {
    id: 'migratory', icon: '🚙', name: '候鸟式躺平者', sub: '上班只为筹措下一次自驾游的路费',
    quote: '「我上班不是为了创造价值，是为了给我的远方筹集电费。」',
    note: '别人活在当下，你活在"下一个假期"。有盼头是好事，但别忘了，哪怕是路上的奔波，也是人生的一部分。',
    scores: { anxiety: 40, logic: 60, action: 75, emptiness: 50 }
  },
  npc: {
    id: 'npc', icon: '🧍', name: 'NPC型玩家', sub: '按时触发打卡代码的背景板角色',
    quote: '「别人在玩《模拟人生》，我只是一段按时触发的循环代码。」',
    note: '世界上 99% 的人都是 NPC，但哪怕是 NPC，也可以给自己加上"每天喝一杯好咖啡"的隐藏设定。',
    scores: { anxiety: 30, logic: 40, action: 35, emptiness: 90 }
  }
};

// ========== 彩蛋身份 ==========
const hiddenTypes = {
  // 全部选第一个 - 理性分析型觉醒
  awakened: {
    id: 'awakened', icon: '⚡', name: '觉醒的分析者', sub: '清醒到可怕，执行力也在觉醒中',
    quote: '「别人在焦虑，你已经在拆解问题了。」',
    note: '你是那种"想清楚再动手"的人。这不是拖延，是策略。关键是：想清楚之后，真的要动手。',
    scores: { anxiety: 70, logic: 100, action: 60, emptiness: 30 },
    check: (answers) => answers.every(a => a === 0)
  },
  // 全部选最后一个 - 彻底通透
  zen_master: {
    id: 'zen_master', icon: '🧘', name: '人间清醒大师', sub: '看透一切，选择最舒服的姿势躺着',
    quote: '「不是不能卷，是懒得配合你们演戏。」',
    note: '你已经到了"无欲则刚"的境界。但偶尔认真一下，你会发现世界还是有回应的。',
    scores: { anxiety: 20, logic: 70, action: 30, emptiness: 40 },
    check: (answers) => answers.every(a => a === 3)
  },
  // 全部选中间（1或2交替）- 纠结本体
  paradox: {
    id: 'paradox', icon: '🔄', name: '纠结悖论体', sub: '选A还是选B？答案永远是"看情况"',
    quote: '「我思考的样子.jpg.jpg.jpg...」',
    note: '你是那种每个选项都能找到理由的人。试着做一次不分析直接选的练习，你会发现：其实没那么难。',
    scores: { anxiety: 85, logic: 80, action: 25, emptiness: 60 },
    check: (answers) => answers.every(a => a === 1 || a === 2)
  }
};

// ========== 选项到身份的映射矩阵 ==========
// 每道题的每个选项会为若干身份类型加分（第1个选项 → 第1个数组，以此类推）
// 最后一题权重最高：得分相同时，优先选择最后一题覆盖的身份
const scoringMap = [
  [['quant','derelict'], ['hoarder'], ['hustler'], ['npc']], // Q1
  [['npc','involutionist'], ['extra','derelict'], ['involutionist'], ['quant']], // Q2
  [['quant','involutionist'], ['hustler'], ['migratory'], ['extra']], // Q3
  [['extra'], ['hoarder','derelict'], ['involutionist'], ['npc']], // Q4
  [['migratory','quant'], ['hustler'], ['hoarder'], ['npc','derelict']], // Q5
  [['extra'], ['quant'], ['involutionist'], ['migratory']], // Q6
  [['hoarder'], ['hustler'], ['involutionist'], ['npc','derelict']], // Q7
  [['quant','derelict'], ['extra','npc'], ['hoarder','hustler'], ['migratory','involutionist']] // Q8
];

// ========== 常量 ==========
const TRANSITION_DELAY = 250;
const THINKING_DURATION = 2000;
const EGG_BURST_DURATION = 2500;
const TOAST_DURATION = 2000;
const TOTAL_QUESTIONS = questions.length;

// ========== 通用工具 ==========
function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ========== 状态 ==========
let currentQ = 0;
let answers = [];
let scores = { derelict:0, hustler:0, hoarder:0, extra:0, quant:0, involutionist:0, migratory:0, npc:0 };
let currentTypeId = 'npc';
let toastTimer = null;

function resetScores() {
  Object.keys(scores).forEach(k => scores[k] = 0);
}

// ========== 初始化 ==========
function initHome() {
  const slogan = homeSlogans[Math.floor(Math.random() * homeSlogans.length)];
  document.getElementById('mainDesc').innerHTML = slogan.text;
  // 更新类型数量（含彩蛋）
  const totalTypes = Object.keys(identityTypes).length + Object.keys(hiddenTypes).length;
  document.getElementById('typeCount').textContent = `${totalTypes} 种身份`;
}

function startQuiz() {
  currentQ = 0;
  answers = [];
  resetScores();
  showScreen('quiz');
  renderQ();
}

function renderQ() {
  const q = questions[currentQ];
  document.getElementById('progressFill').style.width = ((currentQ) / TOTAL_QUESTIONS * 100) + '%';
  document.getElementById('quizStep').textContent = `${currentQ + 1}/${TOTAL_QUESTIONS}`;
  document.getElementById('questionLabel').textContent = q.label;
  document.getElementById('questionText').textContent = q.q;
  
  const optsEl = document.getElementById('options');
  optsEl.replaceChildren();
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.setAttribute('tabindex', '0');
    btn.addEventListener('click', () => selectOpt(i));
    optsEl.appendChild(btn);
  });
  document.getElementById('prevBtn').style.display = currentQ > 0 ? 'block' : 'none';
}

function selectOpt(idx) {
  answers[currentQ] = idx;
  setTimeout(() => {
    if (currentQ < TOTAL_QUESTIONS - 1) {
      currentQ++;
      renderQ();
    } else {
      document.getElementById('progressFill').style.width = '100%';
      calculateResult();
      showThinking();
    }
  }, TRANSITION_DELAY);
}

function prevQ() {
  if (currentQ > 0) { currentQ--; renderQ(); }
}

function calculateResult() {
  resetScores();
  answers.forEach((ansIdx, qIdx) => {
    const typesToAdd = scoringMap[qIdx][ansIdx];
    typesToAdd.forEach(t => scores[t]++);
  });
}

function showThinking() {
  showScreen('thinking');
  const subtitles = [
    '正在读懂你...',
    '你的灵魂正在被解码...',
    '答案马上浮出水面...',
    '正在绘制你的精神图谱...',
    '比你自己更懂你...'
  ];
  const sub = subtitles[Math.floor(Math.random() * subtitles.length)];
  document.getElementById('thinkSub').textContent = sub;
  setTimeout(() => { showResult(); }, THINKING_DURATION);
}

function showResult() {
  let finalId = 'npc';
  let isEgg = false;

  // 先检查彩蛋身份 —— 全部选首项/末项/中间项触发
  for (const id of Object.keys(hiddenTypes)) {
    if (hiddenTypes[id].check(answers)) {
      finalId = id;
      isEgg = true;
      break;
    }
  }

  // 如果没有彩蛋，用累计得分最高项 + 最后一题权重兜底
  if (!isEgg) {
    let maxScore = -1;
    for (const id of Object.keys(scores)) {
      if (scores[id] > maxScore) {
        maxScore = scores[id];
        finalId = id;
      }
    }
    const lastQTypes = scoringMap[TOTAL_QUESTIONS - 1][answers[TOTAL_QUESTIONS - 1]];
    if (!lastQTypes.includes(finalId)) {
      for (const id of lastQTypes) {
        if (scores[id] === maxScore) { finalId = id; break; }
      }
    }
  }

  currentTypeId = finalId;
  const type = isEgg ? hiddenTypes[finalId] : identityTypes[finalId];

  // 设置主题色
  const colors = themeColors[finalId] || themeColors.extra;
  document.documentElement.style.setProperty('--accent', colors.accent);
  document.documentElement.style.setProperty('--accent-light', colors.light);

  // 渲染结果
  document.getElementById('resultBadge').textContent = isEgg ? '✨ 隐藏身份' : '你的真实身份';
  document.getElementById('resultIcon').textContent = type.icon;
  document.getElementById('resultName').textContent = type.name;
  document.getElementById('resultSub').textContent = type.sub;
  document.getElementById('resultQuote').textContent = type.quote;
  document.getElementById('resultNote').textContent = type.note;

  // 渲染四维图（纯 DOM 操作，避免 innerHTML）
  const peerBars = document.getElementById('peerBars');
  const dimMap = [
    { key: 'anxiety', label: '内耗指数', color: '#d4856b' },
    { key: 'logic', label: '爱琢磨', color: '#7b9db5' },
    { key: 'action', label: '行动力', color: '#7aa886' },
    { key: 'emptiness', label: '虚无感', color: '#9b8cb5' }
  ];
  peerBars.replaceChildren();
  dimMap.forEach(d => {
    const val = type.scores[d.key];
    const row = document.createElement('div');
    row.className = 'peer-row';

    const labelEl = document.createElement('div');
    labelEl.className = 'peer-label';
    labelEl.textContent = d.label;

    const barBg = document.createElement('div');
    barBg.className = 'peer-bar-bg';
    const barFill = document.createElement('div');
    barFill.className = 'peer-bar-fill';
    barFill.style.width = val + '%';
    barFill.style.background = d.color;
    barBg.appendChild(barFill);

    const pctEl = document.createElement('div');
    pctEl.className = 'peer-pct';
    pctEl.textContent = val + '%';

    row.appendChild(labelEl);
    row.appendChild(barBg);
    row.appendChild(pctEl);
    peerBars.appendChild(row);
  });

  // 生成二维码（含加载失败处理）
  const testUrl = window.location.href.split('?')[0];
  const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&color=${colors.accent.replace('#','')}&bg=ffffff&data=${encodeURIComponent(testUrl)}`;
  const qrImg = document.getElementById('qrCode');
  qrImg.src = qrSrc;
  qrImg.onerror = () => {
    qrImg.style.display = 'none';
    document.getElementById('qrSection').querySelector('.qr-hint').textContent = '二维码生成失败，请直接分享链接';
  };

  showScreen('result');

  // 彩蛋特效
  if (isEgg) {
    setTimeout(() => showEggBurst(type), 300);
  }
}

function showEggBurst(type) {
  const burst = document.getElementById('egg-burst');
  document.getElementById('eggIcon').textContent = type.icon;
  document.getElementById('eggTitle').textContent = type.name;
  document.getElementById('eggSub').textContent = '🎉 恭喜你触发了隐藏身份！';
  burst.classList.add('show');
  setTimeout(() => {
    burst.classList.remove('show');
  }, EGG_BURST_DURATION);
}

// ========== 考朋友功能 ==========
function showFriendModal() {
  const modal = document.getElementById('friend-modal');
  const container = document.getElementById('friendQuestions');
  container.replaceChildren();

  // Fisher-Yates 洗牌，选3道题展示
  const pool = shuffleArr([0, 2, 5, TOTAL_QUESTIONS - 1]);
  const indices = pool.slice(0, 3);
  indices.forEach(idx => {
    const q = questions[idx];
    const btn = document.createElement('button');
    btn.className = 'fq-btn';

    const labelDiv = document.createElement('div');
    labelDiv.className = 'fq-label';
    labelDiv.textContent = q.label;
    btn.appendChild(labelDiv);
    btn.appendChild(document.createTextNode(q.q));

    btn.addEventListener('click', () => shareQuestion(idx));
    container.appendChild(btn);
  });

  modal.classList.add('show');
}

function closeFriendModal() {
  document.getElementById('friend-modal').classList.remove('show');
}

function shareQuestion(idx) {
  const q = questions[idx];
  // 如果用户还没答过这道题，用默认文案
  const myAnswer = answers[idx] !== undefined
    ? q.opts[answers[idx]]
    : '... 我还没来得及回答这道题';
  const text = `🧪 来挑战我！

「${q.q}」

我的答案：${myAnswer}

你呢？快来测测你是哪种人 👇
${window.location.href.split('?')[0]}`;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('已复制！发给朋友挑战TA');
      closeFriendModal();
    });
  }
}

// ========== 保存 & 分享 ==========
function saveImg() {
  if (typeof html2canvas === 'undefined') {
    showToast('保存功能加载中，请稍后再试或长按截图');
    return;
  }
  const card = document.getElementById('resultCard');
  html2canvas(card, { backgroundColor: null, scale: 2 }).then(canvas => {
    const link = document.createElement('a');
    link.download = '我的生存状态报告.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('报告已保存！');
  }).catch(() => {
    showToast('图片生成失败，请长按截图分享');
  });
}

function shareText() {
  const type = identityTypes[currentTypeId] || hiddenTypes[currentTypeId];
  const icon = type.icon;
  const name = type.name;
  const sub = type.sub;
  const text = `我测了【当代人生状态测试】

鉴定结果：${icon} ${name}
「${sub}」

这不是我的问题，世界本来就是个草台班子。
你也来扫描一下真实状态？🔗`;
  
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('文案已复制！');
    });
  }
}

function retest() {
  // 重置主题色
  document.documentElement.style.setProperty('--accent', '#b85c3a');
  document.documentElement.style.setProperty('--accent-light', '#f0e8dd');
  // 刷新首页文案
  initHome();
  showScreen('home');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), TOAST_DURATION);
}

// ========== 事件绑定 ==========
function bindEvents() {
  // 首页
  document.getElementById('startBtn').addEventListener('click', startQuiz);

  // 答题
  document.getElementById('prevBtn').addEventListener('click', prevQ);

  // 结果页
  document.getElementById('saveImgBtn').addEventListener('click', saveImg);
  document.getElementById('shareTextBtn').addEventListener('click', shareText);
  document.getElementById('friendModalBtn').addEventListener('click', showFriendModal);
  document.getElementById('retestBtn').addEventListener('click', retest);
  document.getElementById('closeFriendModalBtn').addEventListener('click', closeFriendModal);

  // 弹窗背景关闭
  document.getElementById('friend-modal').addEventListener('click', (e) => {
    if (e.target.id === 'friend-modal') closeFriendModal();
  });
  document.getElementById('egg-burst').addEventListener('click', () => {
    document.getElementById('egg-burst').classList.remove('show');
  });

  // 键盘导航：1-4 数字键选择选项
  document.addEventListener('keydown', (e) => {
    const quizScreen = document.getElementById('quiz');
    if (!quizScreen.classList.contains('active')) return;
    const key = parseInt(e.key, 10);
    if (key >= 1 && key <= 4) {
      selectOpt(key - 1);
    } else if (e.key === 'ArrowLeft') {
      prevQ();
    }
  });
}

bindEvents();
initHome();
</script>
